name: Deploy to Yandex Cloud

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
      YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
      YC_BUCKET: ${{ secrets.YC_BUCKET }}
      YC_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.YC_SERVICE_ACCOUNT_KEY_JSON }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Configure Yandex Cloud CLI
        run: |
          echo "$YC_SERVICE_ACCOUNT_KEY_JSON" > sa-key.json
          yc config set service-account-key sa-key.json
          yc config set cloud-id "$YC_CLOUD_ID"
          yc config set folder-id "$YC_FOLDER_ID"
        env:
          YC_SERVICE_ACCOUNT_KEY_JSON: ${{ env.YC_SERVICE_ACCOUNT_KEY_JSON }}
        shell: bash

      - name: Build frontend
        run: npm run build

      - name: Generate sitemap to dist
        run: node scripts/generate-sitemap.js

      - name: List dist before upload
        run: ls -la ./dist && test -f ./dist/sitemap.xml && echo "sitemap.xml present" || (echo "sitemap.xml MISSING" && exit 1)

      - name: Upload frontend to Object Storage (contents of dist to bucket root)
        run: |
          cd dist
          yc storage cp --recursive . "s3://$YC_BUCKET/"

      - name: List bucket after upload
        run: yc storage ls "s3://$YC_BUCKET/" | head -30

      - name: Deploy gallery function
        run: |
          yc serverless function version create \
            --function-name=gallery \
            --runtime=python312 \
            --entrypoint=handler \
            --memory=256m \
            --execution-timeout=60 \
            --source-path=backend/gallery \
            || true

      - name: Deploy auto-blog function
        run: |
          yc serverless function version create \
            --function-name=auto-blog \
            --runtime=python312 \
            --entrypoint=handler \
            --memory=256m \
            --execution-timeout=60 \
            --source-path=backend/auto-blog \
            || true

      - name: Deploy chat-bots function
        run: |
          yc serverless function version create \
            --function-name=chat-bots \
            --runtime=python312 \
            --entrypoint=handler \
            --memory=256m \
            --execution-timeout=60 \
            --source-path=backend/chat-bots \
            || true

      - name: Deploy run-migrations function
        run: |
          yc serverless function version create \
            --function-name=run-migrations \
            --runtime=python312 \
            --entrypoint=handler \
            --memory=256m \
            --execution-timeout=60 \
            --source-path=backend/run-migrations \
            || true

      - name: Deploy sitemap function
        run: |
          yc serverless function version create \
            --function-name=sitemap \
            --runtime=python312 \
            --entrypoint=handler \
            --memory=128m \
            --execution-timeout=30 \
            --source-path=backend/sitemap \
            || true
