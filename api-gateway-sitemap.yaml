# Только sitemap — без бакета. Вставь это в API Gateway и сохрани.
# Проверка: https://ТВОЙ_СЛУЖЕБНЫЙ_ДОМЕН/sitemap.xml должен отдать XML.
# Сайт пусть по-прежнему раздаётся с бакета (домен на бакет). Sitemap — по служебному домену или отдельному поддомену.

openapi: 3.0.0
info:
  title: Sitemap only
  version: 1.0.0
paths:
  /sitemap.xml:
    get:
      operationId: sitemap
      responses:
        "200":
          description: OK
      x-yc-apigateway-integration:
        type: cloud_functions
        function_id: d4e970s0n7por7g0cpc3
        tag: "$latest"
